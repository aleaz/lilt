name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run checks
        run: make ci

  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Build distributions
        run: uv build

      - name: Install wheel and check CLI version
        run: |
          uv venv .ci-smoke
          uv pip install --python .ci-smoke pip
          .ci-smoke/bin/python -m pip install dist/*.whl
          .ci-smoke/bin/lilt --version
          .ci-smoke/bin/lilt --version | grep -v 'unknown'
